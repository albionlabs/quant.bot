# fly.toml app configuration file generated for quant-bot on 2026-04-01T09:39:39+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'quant-bot'
primary_region = 'lhr'

[build]
  dockerfile = 'apps/gateway/Dockerfile'

[env]
  DELEGATION_HOST = '::'
  DELEGATION_SERVICE_URL = 'http://quant-bot.internal:5000'
  OPENCLAW_STATE_DIR = '/data/openclaw'

[mounts]
  source = 'gateway_state'
  destination = '/data/openclaw'
  processes = ['gateway']

[processes]
  delegation = 'node apps/delegation/dist/index.js'
  gateway = 'node apps/gateway/dist/index.js'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['gateway']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
