services:
  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - GATEWAY_PORT=3000
      - AGENT_WS_URL=ws://agent:18789
      - AGENT_RESPONSE_TIMEOUT_MS=${AGENT_RESPONSE_TIMEOUT_MS:-120000}
      - EXECUTION_TOKEN_TTL_SECONDS=${EXECUTION_TOKEN_TTL_SECONDS:-300}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - DELEGATION_SERVICE_URL=http://delegation:5000
      - INTERNAL_SECRET=${INTERNAL_SECRET}
    depends_on:
      - agent
      - tools
      - delegation
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    ports:
      - '18789:18789'
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped

  tools:
    build:
      context: .
      dockerfile: apps/tools/Dockerfile
    ports:
      - '4000:4000'
    environment:
      - TOOLS_PORT=4000
      - BASE_RPC_URL=${BASE_RPC_URL}
      - CHAIN_NAME=${CHAIN_NAME:-base}
      - EXECUTOR_PRIVATE_KEY=${EXECUTOR_PRIVATE_KEY}
      - ALLOWED_SUBGRAPHS=${ALLOWED_SUBGRAPHS}
      - DELEGATION_SERVICE_URL=http://delegation:5000
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - ORDERBOOK_API_URL=http://rest-api:8000
      - ORDERBOOK_API_KEY=${REST_API_KEY}
      - ORDERBOOK_API_SECRET=${REST_API_SECRET}
    restart: unless-stopped

  delegation:
    build:
      context: .
      dockerfile: apps/delegation/Dockerfile
    ports:
      - '5000:5000'
    environment:
      - DELEGATION_PORT=5000
      - DELEGATION_ENCRYPTION_KEY=${DELEGATION_ENCRYPTION_KEY}
      - DYNAMIC_DELEGATION_PRIVATE_KEY=${DYNAMIC_DELEGATION_PRIVATE_KEY}
      - DYNAMIC_WEBHOOK_SECRET=${DYNAMIC_WEBHOOK_SECRET}
      - DYNAMIC_ENVIRONMENT_ID=${DYNAMIC_ENVIRONMENT_ID}
      - DYNAMIC_ADMIN_KEY=${DYNAMIC_ADMIN_KEY}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DELEGATION_TTL_MS=${DELEGATION_TTL_MS:-86400000}
    restart: unless-stopped

  rest-api:
    build:
      context: services/rest-api-stub
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    environment:
      - ROCKET_ADDRESS=0.0.0.0
      - ROCKET_PORT=8000
    restart: unless-stopped
