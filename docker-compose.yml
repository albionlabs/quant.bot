services:
  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - GATEWAY_PORT=3000
      - AGENT_WS_URL=ws://agent:18789
      - AGENT_RESPONSE_TIMEOUT_MS=${AGENT_RESPONSE_TIMEOUT_MS:-120000}
      - EXECUTION_TOKEN_TTL_SECONDS=${EXECUTION_TOKEN_TTL_SECONDS:-300}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - DYNAMIC_WEBHOOK_SECRET=${DYNAMIC_WEBHOOK_SECRET}
      - DELEGATION_SERVICE_URL=http://delegation:5000
      - INTERNAL_SECRET=${INTERNAL_SECRET}
    depends_on:
      - agent
      - tools
      - delegation
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    ports:
      - '18789:18789'
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped

  tools:
    build:
      context: .
      dockerfile: apps/tools/Dockerfile
    ports:
      - '4000:4000'
    environment:
      - TOOLS_PORT=4000
      - BASE_RPC_URL=${BASE_RPC_URL}
      - CHAIN_NAME=${CHAIN_NAME:-base}
      - EXECUTOR_PRIVATE_KEY=${EXECUTOR_PRIVATE_KEY}
      - DYNAMIC_ENVIRONMENT_ID=${DYNAMIC_ENVIRONMENT_ID}
      - DYNAMIC_SIGNING_KEY=${DYNAMIC_SIGNING_KEY}
      - DELEGATION_SERVICE_URL=http://delegation:5000
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - RAINDEX_MCP_COMMAND=${RAINDEX_MCP_COMMAND}
      - RAINDEX_MCP_ARGS=${RAINDEX_MCP_ARGS}
      - RAINDEX_MCP_CWD=${RAINDEX_MCP_CWD}
      - RAINDEX_SETTINGS_URL=${RAINDEX_SETTINGS_URL}
      - RAINDEX_SETTINGS_PATH=${RAINDEX_SETTINGS_PATH}
      - RAINDEX_SETTINGS_YAML=${RAINDEX_SETTINGS_YAML}
      - RAINDEX_REGISTRY_URL=${RAINDEX_REGISTRY_URL}
    volumes:
      - ${RAINDEX_MCP_HOST_PATH:-./services/raindex-mcp}:/app/raindex-mcp:ro
    restart: unless-stopped

  delegation:
    build:
      context: .
      dockerfile: apps/delegation/Dockerfile
    ports:
      - '5000:5000'
    environment:
      - DELEGATION_PORT=5000
      - DELEGATION_ENCRYPTION_KEY=${DELEGATION_ENCRYPTION_KEY}
      - DYNAMIC_DELEGATION_PRIVATE_KEY=${DYNAMIC_DELEGATION_PRIVATE_KEY}
      - DYNAMIC_WEBHOOK_SECRET=${DYNAMIC_WEBHOOK_SECRET}
      - DYNAMIC_ENVIRONMENT_ID=${DYNAMIC_ENVIRONMENT_ID}
      - DYNAMIC_ADMIN_KEY=${DYNAMIC_ADMIN_KEY}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DELEGATION_TTL_MS=${DELEGATION_TTL_MS:-86400000}
    restart: unless-stopped
