name: Deploy

on:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      agent: ${{ steps.filter.outputs.agent }}
      tools: ${{ steps.filter.outputs.tools }}
      gateway: ${{ steps.filter.outputs.gateway }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            agent:
              - 'apps/agent/**'
              - 'packages/**'
              - 'fly.agent.toml'
              - 'pnpm-lock.yaml'
            tools:
              - 'apps/tools/**'
              - 'services/raindex-mcp/**'
              - 'packages/**'
              - 'fly.tools.toml'
              - 'pnpm-lock.yaml'
            gateway:
              - 'apps/gateway/**'
              - 'apps/delegation/**'
              - 'packages/**'
              - 'fly.gateway.toml'
              - 'pnpm-lock.yaml'

  deploy-agent:
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config fly.agent.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-tools:
    needs: changes
    if: needs.changes.outputs.tools == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch raindex-mcp source
        run: |
          # Pin to alastairong1/raindex-mcp fork with Map serialization fix
          # Upstream PR: https://github.com/hardyjosh/raindex-mcp/pull/8
          # Switch back to hardyjosh/raindex-mcp once PR is merged
          RAINDEX_MCP_REPO=https://github.com/alastairong1/raindex-mcp.git
          RAINDEX_MCP_REF=bee767de64550a08f3847cae87de7d445f15ba0b
          rm -rf services/raindex-mcp
          git clone --depth 1 "${RAINDEX_MCP_REPO}" services/raindex-mcp
          cd services/raindex-mcp
          git fetch --depth 1 origin "${RAINDEX_MCP_REF}"
          git checkout "${RAINDEX_MCP_REF}"
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config fly.tools.toml --remote-only --build-arg COMMIT_SHA=${GITHUB_SHA::7}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-gateway:
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config fly.gateway.toml --remote-only --build-arg COMMIT_SHA=${GITHUB_SHA::7}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

