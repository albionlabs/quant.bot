name: Deploy

on:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      agent: ${{ steps.filter.outputs.agent }}
      tools: ${{ steps.filter.outputs.tools }}
      gateway: ${{ steps.filter.outputs.gateway }}
      rest-api: ${{ steps.filter.outputs.rest-api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            agent:
              - 'apps/agent/**'
              - 'packages/**'
              - 'fly.agent.toml'
              - 'pnpm-lock.yaml'
            tools:
              - 'apps/tools/**'
              - 'packages/**'
              - 'fly.tools.toml'
              - 'pnpm-lock.yaml'
            gateway:
              - 'apps/gateway/**'
              - 'packages/**'
              - 'fly.gateway.toml'
              - 'pnpm-lock.yaml'
            rest-api:
              - 'services/rest-api/**'
              - 'fly.rest-api.toml'

  deploy-agent:
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config fly.agent.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-tools:
    needs: changes
    if: needs.changes.outputs.tools == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config fly.tools.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-gateway:
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config fly.gateway.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-rest-api:
    needs: changes
    if: needs.changes.outputs.rest-api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: |
          cp ../../fly.rest-api.toml fly.toml
          flyctl deploy --local-only --wait-timeout 120
        working-directory: services/rest-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
