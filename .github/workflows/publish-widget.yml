name: Publish Chat Widget

on:
  push:
    branches: [main]
    paths:
      - 'packages/chat-widget/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build --filter=@albionlabs/chat-widget

      - name: Check if version already published
        id: version-check
        run: |
          LOCAL=$(node -p "require('./packages/chat-widget/package.json').version")
          if npm view @albionlabs/chat-widget@$LOCAL version 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version $LOCAL already published, skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version $LOCAL not found on npm, will publish."
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.exists == 'false'
        working-directory: packages/chat-widget
        run: npm publish --access public --provenance
