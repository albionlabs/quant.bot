app = 'quant-bot'
primary_region = 'lhr'

[build]
  dockerfile = 'apps/gateway/Dockerfile'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = '10s'
  interval = '30s'
  method = 'GET'
  path = '/api/health'
  timeout = '5s'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
